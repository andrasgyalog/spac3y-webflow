<!-- ============================================================= -->
<!-- SPAC3Y — SECTION 4: UI ELEMENT FOR THE                       -->
<!--          "What clients usually come to us for" ZONE          -->
<!-- Self-contained. Paste into a Webflow Embed block.            -->
<!-- Requires: https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v12/assets/tokens-loop.mp4  (seamless boomerang loop)  -->
<!--                                                              -->
<!-- Title size is pure CSS: container query units (cqw) tie the  -->
<!-- font-size to the width of the text column, so each word      -->
<!-- fills it without any JS measuring. Per-word values are tuned -->
<!-- to the letter count — adjust them if the wording changes.    -->
<!-- ============================================================= -->

<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<section class="spacey-clients">
  <div class="spacey-clients__inner">

    <!-- EDIT: section label -->
    <div class="spacey-seclabel spacey-seclabel--clients">Main page UI element</div>
    <!-- EDIT: section heading (the zone this element belongs to) -->
    <h2 class="spacey-clients__heading">What clients usually come to us for</h2>

    <!-- ---------- CARD ---------- -->
    <article class="spacey-ccard" id="spaceyCCard" tabindex="0">
      <div class="spacey-ccard__glow" aria-hidden="true"></div>

      <div class="spacey-ccard__body">

        <!-- EDIT: card title — one word per row, sized to fill the column -->
        <h3 class="spacey-ccard__giant">
          <span class="spacey-ccard__giantline spacey-ccard__giantline--a">Tokenized</span>
          <span class="spacey-ccard__giantline spacey-ccard__giantline--b">Loyalty</span>
        </h3>

        <div class="spacey-ccard__rule" aria-hidden="true"></div>

        <!-- EDIT: card category -->
        <span class="spacey-ccard__cat">Web3 Experiences</span>

        <div class="spacey-ccard__rule" aria-hidden="true"></div>

        <!-- EDIT: card description -->
        <p class="spacey-ccard__desc">Smart loyalty systems, community ownership and digital rewards.</p>

      </div>

      <!-- white partition between copy and video -->
      <div class="spacey-ccard__divider" aria-hidden="true"></div>

      <!-- EDIT: card video (boomerang loop, normal speed) -->
      <video class="spacey-ccard__video" id="spaceyCCardVideo"
             src="https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v12/assets/tokens-loop.mp4"
             autoplay loop muted playsinline preload="auto"
             disablepictureinpicture aria-hidden="true"></video>
    </article>

  </div>
</section>

<style>
  .spacey-clients{
    --video-w:44%;                     /* width of the video panel */
    position:relative;
    background:#05060a;
    /* barely-there blue dot grid */
    background-image:radial-gradient(rgba(91,110,245,.16) 1px, transparent 1px);
    background-size:24px 24px;
    background-position:0 0;
    padding:clamp(48px,8vw,110px) 0;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .spacey-clients__inner{ position:relative; z-index:1; max-width:1240px; margin:0 auto; padding:0 clamp(16px,4vw,48px); }

  .spacey-seclabel--clients{
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:600; text-transform:uppercase;
    font-size:clamp(11px,1.1vw,13px);
    letter-spacing:.42em; color:#5b5bf5;
    margin-bottom:clamp(14px,1.8vw,20px);
  }
  .spacey-clients__heading{
    margin:0 0 clamp(26px,3.4vw,44px);
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    font-size:clamp(24px,3.6vw,40px);
    line-height:1.14; letter-spacing:-.008em;
    color:#eef1f8;
  }

  /* ---------- Card — roughly half-width, centred ---------- */
  .spacey-ccard{
    --card-bg:#080a14;
    position:relative; overflow:hidden;
    width:100%; max-width:660px; margin:0 auto;
    border-radius:20px;
    background:
      linear-gradient(104deg,
        rgba(91,91,245,.26) 0%,
        rgba(91,91,245,.10) 26%,
        rgba(91,91,245,.02) 46%,
        transparent 64%),
      var(--card-bg);
    border:1px solid rgba(120,130,255,.18);
    min-height:clamp(280px,30vw,380px);
    display:flex; align-items:center;
    isolation:isolate; outline:none;
    transition:border-color .35s ease, box-shadow .35s ease, transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .spacey-ccard:hover, .spacey-ccard:focus-visible{
    border-color:rgba(180,190,255,.55);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.10),
      0 0 0 1px rgba(150,160,255,.20),
      0 18px 60px rgba(91,91,245,.28),
      0 0 90px rgba(91,91,245,.18);
    transform:translateY(-3px);
  }

  /* accent hairline down the left edge */
  .spacey-ccard::before{
    content:''; position:absolute; z-index:4; left:0; top:0; bottom:0; width:2px;
    background:linear-gradient(180deg, transparent, rgba(123,123,255,.9) 28%, rgba(123,123,255,.9) 72%, transparent);
    opacity:.5; transition:opacity .35s ease;
  }
  .spacey-ccard:hover::before{ opacity:1; }

  .spacey-ccard__glow{
    position:absolute; z-index:0; pointer-events:none;
    right:-6%; top:50%; transform:translateY(-50%);
    width:52%; aspect-ratio:1/1;
    background:radial-gradient(circle, rgba(91,91,245,.34) 0%, rgba(91,91,245,.10) 45%, transparent 70%);
    filter:blur(10px);
  }

  /* left column: runs from the card edge up to the partition */
  .spacey-ccard__body{
    position:relative; z-index:3;
    width:calc(100% - var(--video-w));
    padding:clamp(20px,2.6vw,32px) clamp(12px,1.4vw,18px) clamp(20px,2.6vw,32px) clamp(20px,2.6vw,30px);
  }

  /* ---------- Giant title ---------- */
  .spacey-ccard__giant{
    margin:0 0 clamp(10px,1.4vw,16px);
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    line-height:.94;
    letter-spacing:-.02em;             /* em-based, scales with the size */
    color:#fff;
    overflow:hidden;                   /* hard guarantee it never reaches the video */
  }
  .spacey-ccard__giantline{
    display:block;
    white-space:nowrap;
    text-transform:uppercase;
  }
  /* Fallback for browsers without container query units */
  .spacey-ccard__giantline--a{ font-size:clamp(22px,4.6vw,52px); }
  .spacey-ccard__giantline--b{ font-size:clamp(28px,5.8vw,66px); }

  /* Preferred: size follows the column width exactly, no JS.
     Values are tuned per word length (TOKENIZED = 9 chars, LOYALTY = 7). */
  @supports (font-size:1cqw){
    .spacey-ccard__body{ container-type:inline-size; }
    .spacey-ccard__giantline--a{ font-size:17cqw; }
    .spacey-ccard__giantline--b{ font-size:21.5cqw; }
  }

  /* ---------- Dashed rules ---------- */
  .spacey-ccard__rule{
    height:0;
    border-top:1px dashed rgba(255,255,255,.28);
    margin:clamp(10px,1.4vw,16px) 0;
    transition:border-color .35s ease;
  }
  .spacey-ccard:hover .spacey-ccard__rule{ border-color:rgba(190,198,255,.5); }

  /* ---------- Centred category ---------- */
  .spacey-ccard__cat{
    display:block; text-align:center;
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:600; text-transform:uppercase;
    font-size:clamp(10px,1.05vw,13px);
    letter-spacing:.26em;
    color:#8f8fff;
  }

  /* ---------- Supporting copy ---------- */
  .spacey-ccard__desc{
    margin:0; text-align:center;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:clamp(12px,1.15vw,14px); line-height:1.5;
    color:#aab2c6;
  }

  /* ---------- White partition ---------- */
  .spacey-ccard__divider{
    position:absolute; z-index:3; right:var(--video-w);
    top:9%; bottom:9%; width:1px;
    background:linear-gradient(180deg,
      transparent 0%,
      rgba(255,255,255,.35) 12%,
      rgba(255,255,255,.85) 50%,
      rgba(255,255,255,.35) 88%,
      transparent 100%);
    transition:box-shadow .35s ease, opacity .35s ease;
    opacity:.9;
  }
  .spacey-ccard:hover .spacey-ccard__divider{
    opacity:1;
    box-shadow:0 0 14px rgba(255,255,255,.55);
  }

  /* ---------- Video (hard edge, normal speed) ---------- */
  .spacey-ccard__video{
    position:absolute; z-index:2; top:0; right:0; bottom:0;
    height:100%; width:var(--video-w);
    object-fit:cover; object-position:center;
    pointer-events:none;
  }

  /* ---------- Mobile: stack, partition becomes horizontal ---------- */
  @media (max-width:720px){
    .spacey-ccard{ min-height:auto; display:block; max-width:480px; }
    .spacey-ccard__body{ width:100%; padding:24px 20px 26px; }
    .spacey-ccard__video{
      position:relative; width:100%; height:200px; display:block;
    }
    .spacey-ccard__divider{
      right:auto; left:8%; width:84%; top:auto; bottom:200px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.75) 50%, transparent);
    }
    .spacey-ccard__glow{ width:90%; right:-20%; }
  }
</style>

<script>
/* Only job left: nudge autoplay on Safari/iOS. No layout JS. */
(function(){
  var v = document.getElementById('spaceyCCardVideo');
  if(!v) return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){ v.pause(); return; }
  var tryPlay = function(){ var p = v.play(); if(p && p.catch) p.catch(function(){}); };
  tryPlay();
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) tryPlay(); });
})();
</script>
