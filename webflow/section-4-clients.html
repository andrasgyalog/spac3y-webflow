<!-- ============================================================= -->
<!-- SPAC3Y — SECTION 4: UI ELEMENT FOR THE                       -->
<!--          "What clients usually come to us for" ZONE          -->
<!-- Self-contained. Paste into a Webflow Embed block.            -->
<!-- Requires: https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v10/assets/tokens-loop.mp4  (seamless boomerang loop)  -->
<!--                                                              -->
<!-- Video plays at normal speed, hard-edged, separated from the  -->
<!-- copy by a thin white divider. On hover the two title words   -->
<!-- centre themselves inside the title box one after the other.  -->
<!-- ============================================================= -->

<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<section class="spacey-clients">
  <div class="spacey-clients__inner">

    <!-- EDIT: section label -->
    <div class="spacey-seclabel spacey-seclabel--clients">Main page UI element</div>
    <!-- EDIT: section heading (the zone this element belongs to) -->
    <h2 class="spacey-clients__heading">What clients usually come to us for</h2>

    <!-- ---------- CARD ---------- -->
    <article class="spacey-ccard" id="spaceyCCard" tabindex="0">
      <div class="spacey-ccard__glow" aria-hidden="true"></div>

      <div class="spacey-ccard__body">
        <!-- EDIT: card category -->
        <span class="spacey-ccard__cat">Web3 Experiences</span>

        <!-- EDIT: card title — each word animates to centre on hover -->
        <h3 class="spacey-ccard__title">
          <span class="spacey-ccard__titlebox" id="spaceyTitleBox">
            <span class="spacey-ccard__word">Tokenized</span>
            <span class="spacey-ccard__word">Loyalty</span>
          </span>
        </h3>

        <!-- EDIT: card description -->
        <p class="spacey-ccard__desc">Smart loyalty systems, community ownership<br>and digital rewards.</p>
      </div>

      <!-- white partition between copy and video -->
      <div class="spacey-ccard__divider" aria-hidden="true"></div>

      <!-- EDIT: card video (boomerang loop, normal speed) -->
      <video class="spacey-ccard__video" id="spaceyCCardVideo"
             src="https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v10/assets/tokens-loop.mp4"
             autoplay loop muted playsinline preload="auto"
             disablepictureinpicture aria-hidden="true"></video>
    </article>

  </div>
</section>

<style>
  .spacey-clients{
    --video-w:46%;                     /* width of the video panel */
    background:#05060a;
    padding:clamp(48px,8vw,110px) 0;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .spacey-clients__inner{ max-width:1240px; margin:0 auto; padding:0 clamp(16px,4vw,48px); }

  .spacey-seclabel--clients{
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:600; text-transform:uppercase;
    font-size:clamp(11px,1.1vw,13px);
    letter-spacing:.42em; color:#5b5bf5;
    margin-bottom:clamp(14px,1.8vw,20px);
  }
  .spacey-clients__heading{
    margin:0 0 clamp(26px,3.4vw,44px);
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    font-size:clamp(24px,3.6vw,40px);
    line-height:1.14; letter-spacing:-.008em;
    color:#eef1f8;
  }

  /* ---------- Card ---------- */
  .spacey-ccard{
    --card-bg:#080a14;
    position:relative; overflow:hidden;
    border-radius:20px;
    background:
      linear-gradient(104deg,
        rgba(91,91,245,.26) 0%,
        rgba(91,91,245,.10) 26%,
        rgba(91,91,245,.02) 46%,
        transparent 64%),
      var(--card-bg);
    border:1px solid rgba(120,130,255,.18);
    min-height:clamp(320px,36vw,460px);
    display:flex; align-items:center;
    isolation:isolate; outline:none;
    transition:border-color .35s ease, box-shadow .35s ease, transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .spacey-ccard:hover, .spacey-ccard:focus-visible{
    border-color:rgba(180,190,255,.55);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.10),
      0 0 0 1px rgba(150,160,255,.20),
      0 18px 60px rgba(91,91,245,.28),
      0 0 90px rgba(91,91,245,.18);
    transform:translateY(-3px);
  }

  /* accent hairline down the left edge */
  .spacey-ccard::before{
    content:''; position:absolute; z-index:4; left:0; top:0; bottom:0; width:2px;
    background:linear-gradient(180deg, transparent, rgba(123,123,255,.9) 28%, rgba(123,123,255,.9) 72%, transparent);
    opacity:.5; transition:opacity .35s ease;
  }
  .spacey-ccard:hover::before{ opacity:1; }

  .spacey-ccard__glow{
    position:absolute; z-index:0; pointer-events:none;
    right:-6%; top:50%; transform:translateY(-50%);
    width:52%; aspect-ratio:1/1;
    background:radial-gradient(circle, rgba(91,91,245,.34) 0%, rgba(91,91,245,.10) 45%, transparent 70%);
    filter:blur(10px);
  }

  .spacey-ccard__body{
    position:relative; z-index:3;
    padding:clamp(28px,4vw,56px);
    width:calc(100% - var(--video-w));
  }
  .spacey-ccard__cat{
    display:block; margin-bottom:clamp(12px,1.4vw,18px);
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-weight:600; font-size:clamp(14px,1.5vw,18px);
    color:#7b7bff; letter-spacing:.005em;
  }

  /* ---------- Title box + word centring ---------- */
  .spacey-ccard__title{ margin:0 0 clamp(14px,1.6vw,22px); }
  .spacey-ccard__titlebox{
    display:block;
    padding:.20em .46em .26em;
    border:1px solid rgba(255,255,255,.20);
    border-radius:12px;
    background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    font-size:clamp(26px,3.6vw,44px);
    line-height:1.10; letter-spacing:-.01em;
    color:#fff;
    transition:border-color .35s ease, background .35s ease, box-shadow .35s ease;
  }
  .spacey-ccard:hover .spacey-ccard__titlebox{
    border-color:rgba(190,198,255,.6);
    background:linear-gradient(180deg, rgba(123,123,255,.16), rgba(255,255,255,.03));
    box-shadow:0 0 26px rgba(91,91,245,.30);
  }
  /* each word is its own row so it can travel independently */
  .spacey-ccard__word{
    display:block; width:max-content;
    transform:translateX(0);
    /* ease-out (expo-ish): quick departure, long soft landing */
    transition:transform .62s cubic-bezier(.16,1,.3,1);
  }
  /* --center is measured in JS = (box inner width - word width) / 2 */
  .spacey-ccard:hover .spacey-ccard__word,
  .spacey-ccard:focus-visible .spacey-ccard__word{
    transform:translateX(var(--center,0px));
  }
  /* second word follows the first */
  .spacey-ccard:hover .spacey-ccard__word:nth-child(2),
  .spacey-ccard:focus-visible .spacey-ccard__word:nth-child(2){
    transition-delay:.13s;
  }

  .spacey-ccard__desc{
    margin:0;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:clamp(14px,1.5vw,18px); line-height:1.5;
    color:#aab2c6;
  }

  /* ---------- White partition ---------- */
  .spacey-ccard__divider{
    position:absolute; z-index:3; right:var(--video-w);
    top:9%; bottom:9%; width:1px;
    background:linear-gradient(180deg,
      transparent 0%,
      rgba(255,255,255,.35) 12%,
      rgba(255,255,255,.85) 50%,
      rgba(255,255,255,.35) 88%,
      transparent 100%);
    transition:box-shadow .35s ease, opacity .35s ease;
    opacity:.9;
  }
  .spacey-ccard:hover .spacey-ccard__divider{
    opacity:1;
    box-shadow:0 0 14px rgba(255,255,255,.55);
  }

  /* ---------- Video (hard edge, normal speed) ---------- */
  .spacey-ccard__video{
    position:absolute; z-index:2; top:0; right:0; bottom:0;
    height:100%; width:var(--video-w);
    object-fit:cover; object-position:center;
    pointer-events:none;
  }

  /* ---------- Mobile: stack, divider becomes horizontal ---------- */
  @media (max-width:720px){
    .spacey-ccard{ min-height:auto; display:block; }
    .spacey-ccard__body{ width:100%; padding:26px 22px 30px; }
    .spacey-ccard__video{
      position:relative; width:100%; height:220px; display:block;
    }
    .spacey-ccard__divider{
      right:auto; left:8%; width:84%; top:auto; bottom:220px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.75) 50%, transparent);
    }
    .spacey-ccard__glow{ width:90%; right:-20%; }
  }
</style>

<script>
(function(){
  var card = document.getElementById('spaceyCCard');
  var box  = document.getElementById('spaceyTitleBox');
  var v    = document.getElementById('spaceyCCardVideo');

  /* --- video: normal speed, just make sure it actually plays --- */
  if(v){
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce){ v.pause(); }
    else{
      var tryPlay = function(){ var p = v.play(); if(p && p.catch) p.catch(function(){}); };
      tryPlay();
      document.addEventListener('visibilitychange', function(){ if(!document.hidden) tryPlay(); });
    }
  }

  /* --- measure how far each title word must travel to sit centred --- */
  if(!box) return;
  var words = box.querySelectorAll('.spacey-ccard__word');

  function measure(){
    var cs = window.getComputedStyle(box);
    var inner = box.clientWidth
              - parseFloat(cs.paddingLeft || 0)
              - parseFloat(cs.paddingRight || 0);
    Array.prototype.forEach.call(words, function(w){
      var off = (inner - w.offsetWidth) / 2;
      if(!isFinite(off) || off < 0) off = 0;
      w.style.setProperty('--center', off.toFixed(1) + 'px');
    });
  }

  measure();
  window.addEventListener('resize', measure);
  // widths shift once the display font swaps in
  if(document.fonts && document.fonts.ready && document.fonts.ready.then){
    document.fonts.ready.then(measure).catch(function(){});
  }
  window.addEventListener('load', measure);
})();
</script>
