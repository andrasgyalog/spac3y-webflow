<!-- ============================================================= -->
<!-- SPAC3Y — SECTION 4: UI ELEMENT FOR THE                       -->
<!--          "What clients usually come to us for" ZONE          -->
<!-- Self-contained. Paste into a Webflow Embed block.            -->
<!-- Requires: https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v11/assets/tokens-loop.mp4  (seamless boomerang loop)  -->
<!--                                                              -->
<!-- Layout: giant title stretched edge-to-edge up to the white   -->
<!-- partition, then a dashed rule, centred category, another     -->
<!-- rule, then the supporting copy.                              -->
<!-- The title font-size is computed in JS so each word fills the -->
<!-- column exactly; re-measured on resize and on font swap.      -->
<!-- ============================================================= -->

<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<section class="spacey-clients">
  <div class="spacey-clients__inner">

    <!-- EDIT: section label -->
    <div class="spacey-seclabel spacey-seclabel--clients">Main page UI element</div>
    <!-- EDIT: section heading (the zone this element belongs to) -->
    <h2 class="spacey-clients__heading">What clients usually come to us for</h2>

    <!-- ---------- CARD ---------- -->
    <article class="spacey-ccard" id="spaceyCCard" tabindex="0">
      <div class="spacey-ccard__glow" aria-hidden="true"></div>

      <div class="spacey-ccard__body">

        <!-- EDIT: card title — stretched to the full column width -->
        <h3 class="spacey-ccard__giant" id="spaceyGiant">
          <span class="spacey-ccard__giantline">Tokenized</span>
          <span class="spacey-ccard__giantline">Loyalty</span>
        </h3>

        <div class="spacey-ccard__rule" aria-hidden="true"></div>

        <!-- EDIT: card category -->
        <span class="spacey-ccard__cat">Web3 Experiences</span>

        <div class="spacey-ccard__rule" aria-hidden="true"></div>

        <!-- EDIT: card description -->
        <p class="spacey-ccard__desc">Smart loyalty systems, community ownership and digital rewards.</p>

      </div>

      <!-- white partition between copy and video -->
      <div class="spacey-ccard__divider" aria-hidden="true"></div>

      <!-- EDIT: card video (boomerang loop, normal speed) -->
      <video class="spacey-ccard__video" id="spaceyCCardVideo"
             src="https://cdn.jsdelivr.net/gh/andrasgyalog/spac3y-webflow@v11/assets/tokens-loop.mp4"
             autoplay loop muted playsinline preload="auto"
             disablepictureinpicture aria-hidden="true"></video>
    </article>

  </div>
</section>

<style>
  .spacey-clients{
    --video-w:46%;                     /* width of the video panel */
    background:#05060a;
    padding:clamp(48px,8vw,110px) 0;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .spacey-clients__inner{ max-width:1240px; margin:0 auto; padding:0 clamp(16px,4vw,48px); }

  .spacey-seclabel--clients{
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:600; text-transform:uppercase;
    font-size:clamp(11px,1.1vw,13px);
    letter-spacing:.42em; color:#5b5bf5;
    margin-bottom:clamp(14px,1.8vw,20px);
  }
  .spacey-clients__heading{
    margin:0 0 clamp(26px,3.4vw,44px);
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    font-size:clamp(24px,3.6vw,40px);
    line-height:1.14; letter-spacing:-.008em;
    color:#eef1f8;
  }

  /* ---------- Card ---------- */
  .spacey-ccard{
    --card-bg:#080a14;
    position:relative; overflow:hidden;
    border-radius:20px;
    background:
      linear-gradient(104deg,
        rgba(91,91,245,.26) 0%,
        rgba(91,91,245,.10) 26%,
        rgba(91,91,245,.02) 46%,
        transparent 64%),
      var(--card-bg);
    border:1px solid rgba(120,130,255,.18);
    min-height:clamp(320px,36vw,460px);
    display:flex; align-items:center;
    isolation:isolate; outline:none;
    transition:border-color .35s ease, box-shadow .35s ease, transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .spacey-ccard:hover, .spacey-ccard:focus-visible{
    border-color:rgba(180,190,255,.55);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.10),
      0 0 0 1px rgba(150,160,255,.20),
      0 18px 60px rgba(91,91,245,.28),
      0 0 90px rgba(91,91,245,.18);
    transform:translateY(-3px);
  }

  /* accent hairline down the left edge */
  .spacey-ccard::before{
    content:''; position:absolute; z-index:4; left:0; top:0; bottom:0; width:2px;
    background:linear-gradient(180deg, transparent, rgba(123,123,255,.9) 28%, rgba(123,123,255,.9) 72%, transparent);
    opacity:.5; transition:opacity .35s ease;
  }
  .spacey-ccard:hover::before{ opacity:1; }

  .spacey-ccard__glow{
    position:absolute; z-index:0; pointer-events:none;
    right:-6%; top:50%; transform:translateY(-50%);
    width:52%; aspect-ratio:1/1;
    background:radial-gradient(circle, rgba(91,91,245,.34) 0%, rgba(91,91,245,.10) 45%, transparent 70%);
    filter:blur(10px);
  }

  /* left column: runs from the card edge up to the partition */
  .spacey-ccard__body{
    position:relative; z-index:3;
    width:calc(100% - var(--video-w));
    padding:clamp(26px,3.4vw,46px) clamp(18px,2vw,28px) clamp(26px,3.4vw,46px) clamp(26px,3.4vw,46px);
  }

  /* ---------- Giant title ---------- */
  .spacey-ccard__giant{
    margin:0 0 clamp(14px,1.8vw,22px);
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:700;
    line-height:.92;
    letter-spacing:-.02em;             /* em-based so it scales with the fitted size */
    color:#fff;
  }
  .spacey-ccard__giantline{
    display:inline-block;              /* hugs the text so JS can measure it */
    white-space:nowrap;
    text-transform:uppercase;
    font-size:56px;                    /* placeholder — JS overwrites to fit exactly */
  }
  /* each word on its own row */
  .spacey-ccard__giantline + .spacey-ccard__giantline{ margin-top:.02em; }
  .spacey-ccard__giant > span{ display:block; }

  /* ---------- Dashed rules ---------- */
  .spacey-ccard__rule{
    height:0;
    border-top:1px dashed rgba(255,255,255,.28);
    margin:clamp(14px,1.8vw,20px) 0;
    transition:border-color .35s ease;
  }
  .spacey-ccard:hover .spacey-ccard__rule{ border-color:rgba(190,198,255,.5); }

  /* ---------- Centred category ---------- */
  .spacey-ccard__cat{
    display:block; text-align:center;
    font-family:'Clash Display','Archivo Black',Impact,sans-serif;
    font-weight:600; text-transform:uppercase;
    font-size:clamp(11px,1.15vw,15px);
    letter-spacing:.30em;
    color:#8f8fff;
  }

  /* ---------- Supporting copy ---------- */
  .spacey-ccard__desc{
    margin:0; text-align:center;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:clamp(13px,1.3vw,16px); line-height:1.55;
    color:#aab2c6;
  }

  /* ---------- White partition ---------- */
  .spacey-ccard__divider{
    position:absolute; z-index:3; right:var(--video-w);
    top:9%; bottom:9%; width:1px;
    background:linear-gradient(180deg,
      transparent 0%,
      rgba(255,255,255,.35) 12%,
      rgba(255,255,255,.85) 50%,
      rgba(255,255,255,.35) 88%,
      transparent 100%);
    transition:box-shadow .35s ease, opacity .35s ease;
    opacity:.9;
  }
  .spacey-ccard:hover .spacey-ccard__divider{
    opacity:1;
    box-shadow:0 0 14px rgba(255,255,255,.55);
  }

  /* ---------- Video (hard edge, normal speed) ---------- */
  .spacey-ccard__video{
    position:absolute; z-index:2; top:0; right:0; bottom:0;
    height:100%; width:var(--video-w);
    object-fit:cover; object-position:center;
    pointer-events:none;
  }

  /* ---------- Mobile: stack, partition becomes horizontal ---------- */
  @media (max-width:720px){
    .spacey-ccard{ min-height:auto; display:block; }
    .spacey-ccard__body{ width:100%; padding:26px 22px 30px; }
    .spacey-ccard__video{
      position:relative; width:100%; height:220px; display:block;
    }
    .spacey-ccard__divider{
      right:auto; left:8%; width:84%; top:auto; bottom:220px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.75) 50%, transparent);
    }
    .spacey-ccard__glow{ width:90%; right:-20%; }
  }
</style>

<script>
(function(){
  var v     = document.getElementById('spaceyCCardVideo');
  var giant = document.getElementById('spaceyGiant');

  /* --- video: normal speed, just make sure it actually plays --- */
  if(v){
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce){ v.pause(); }
    else{
      var tryPlay = function(){ var p = v.play(); if(p && p.catch) p.catch(function(){}); };
      tryPlay();
      document.addEventListener('visibilitychange', function(){ if(!document.hidden) tryPlay(); });
    }
  }

  /* --- fit each title word to the exact column width --- */
  if(!giant) return;
  var lines = giant.querySelectorAll('.spacey-ccard__giantline');
  var REF = 100;   // measure at a known size, then scale proportionally

  function fit(){
    var target = giant.clientWidth;
    if(!target) return;
    Array.prototype.forEach.call(lines, function(el){
      el.style.fontSize = REF + 'px';
      var natural = el.offsetWidth;          // inline-block hugs the text
      if(natural > 0){
        el.style.fontSize = (REF * target / natural).toFixed(2) + 'px';
      }
    });
  }

  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('load', fit);
  // Clash Display swaps in asynchronously and changes the metrics
  if(document.fonts && document.fonts.ready && document.fonts.ready.then){
    document.fonts.ready.then(fit).catch(function(){});
  }
})();
</script>
